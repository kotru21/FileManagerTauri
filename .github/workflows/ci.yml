name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      VITE_USE_PERF_LOGS: 'false'
      USE_PERF_LOGS: 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Verify Node version
        run: node -e "const v=process.versions.node.split('.')[0]; if(+v>=25) { console.error('Node 25+ breaks madge'); process.exit(1); }"

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Lint all (biome + clippy)
        run: npm run lint:all

      - name: Check import cycles (madge)
        run: npm run check:imports

      - name: Typecheck
        run: npm run typecheck

      - name: Rust format check
        run: cargo fmt --all --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run tests and coverage
        run: npm run test:coverage

      - name: Run core coverage gates
        run: npm run test:coverage:core

      - name: Rust integration tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            coverage
            coverage-core

  e2e:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Build Tauri (debug)
        run: cargo build --manifest-path src-tauri/Cargo.toml
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium
        timeout-minutes: 15
      - name: Run E2E
        run: npm run test:e2e:ci
        env:
          CI: true
          DEV_SERVER_URL: http://localhost:1420
          TAURI_CDP_URL: http://localhost:9222
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: --remote-debugging-port=9222
