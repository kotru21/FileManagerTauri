name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_USE_PERF_LOGS: 'false'
      USE_PERF_LOGS: 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Verify Node version
        run: node -e "const v=process.versions.node.split('.')[0]; if(+v>=25) { console.error('Node 25+ breaks madge'); process.exit(1); }"

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Lint Rust (clippy)
        run: npm run lint:rust

      - name: Check import cycles (madge)
        run: npm run check:imports

      - name: Run lint (biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests and coverage
        run: npm run test:coverage

      - name: Run core coverage gates (shared/lib + stores)
        run: npm run test:coverage:core

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            coverage
            coverage-core

  e2e:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run E2E
        run: npm run test:e2e:ci
        env:
          CI: true
          DEV_SERVER_URL: http://localhost:1420
