name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      TARGET: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Get version
        id: version
        shell: bash
        run: echo "value=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"
      - uses: oven-sh/setup-bun@v2
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('File Manager {0}', github.ref_name) || '' }}
          releaseDraft: ${{ startsWith(github.ref, 'refs/tags/') }}
          prerelease: false
          args: --target ${{ env.TARGET }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        if: github.event_name != 'pull_request'
        with:
          name: windows-binaries-v${{ steps.version.outputs.value }}
          path: |
            src-tauri/target/${{ env.TARGET }}/release/bundle/msi/*.msi
            src-tauri/target/${{ env.TARGET }}/release/bundle/nsis/*.exe
          retention-days: 14
          if-no-files-found: error
